<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Mentor | AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #fdfcfb 0%, #e2d1c3 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-800">

    <!-- Auth View -->
    <div id="auth-view" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-md p-8 rounded-[2.5rem] fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl text-white text-2xl mb-4 shadow-xl shadow-indigo-200">
                    <i class="fas fa-robot"></i>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight">Virtual Mentor</h1>
                <p class="text-slate-500 mt-2">Personalized AI Academic Guidance</p>
            </div>

            <div class="flex p-1 bg-slate-100 rounded-2xl mb-8">
                <button onclick="toggleAuth('login')" id="btn-login" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition bg-white shadow-sm text-indigo-600">Login</button>
                <button onclick="toggleAuth('reg')" id="btn-reg" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition text-slate-400">Register</button>
            </div>

            <form id="login-form" onsubmit="authAction(event, 'login')" class="space-y-4">
                <input type="text" name="username" placeholder="Username" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="password" name="password" placeholder="Password" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">Enter Workspace</button>
            </form>

            <form id="reg-form" onsubmit="authAction(event, 'reg')" class="hidden space-y-4">
                <input type="text" name="username" placeholder="Username" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="password" name="password" placeholder="Password" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="text" name="major" placeholder="Field of Study (e.g. Data Science)" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <input type="text" name="goals" placeholder="Goals (comma separated)" required class="w-full px-5 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">Create Account</button>
            </form>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dash-view" class="hidden min-h-screen fade-in">
        <nav class="p-6">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">
                        <i class="fas fa-robot"></i>
                    </span>
                    <h2 class="font-bold text-xl hidden md:block">Virtual Mentor</h2>
                </div>
                <div class="flex items-center gap-4">
                    <span id="welcome-user" class="font-semibold text-slate-600 text-sm"></span>
                    <button onclick="logout()" class="w-10 h-10 bg-white border border-slate-200 rounded-xl flex items-center justify-center text-slate-400 hover:text-red-500 hover:border-red-100 transition">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-8 rounded-[2rem] space-y-6">
                    <div>
                        <h4 class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em] mb-2">Student Profile</h4>
                        <p id="profile-major" class="text-2xl font-extrabold text-slate-900">Loading...</p>
                    </div>
                    <hr class="border-slate-100">
                    <div>
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3">Key Focus Areas</h4>
                        <div id="goal-container" class="flex flex-wrap gap-2">
                            <span class="text-[10px] text-slate-400 italic">No goals set yet</span>
                        </div>
                    </div>
                </div>

                <!-- File Upload Card -->
                <div class="glass-card p-8 rounded-[2rem]">
                    <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-3">Document Context</h4>
                    <input type="file" id="file-upload" class="hidden" onchange="handleFileUpload(this)">
                    <button onclick="document.getElementById('file-upload').click()" class="w-full py-4 px-4 border-2 border-dashed border-indigo-100 rounded-2xl text-indigo-500 text-xs font-bold hover:border-indigo-400 hover:bg-indigo-50/30 transition flex flex-col items-center justify-center gap-2">
                        <i class="fas fa-cloud-arrow-up text-xl"></i>
                        <span>Upload CV or Curriculum</span>
                    </button>
                    <p id="file-status" class="text-[10px] mt-3 text-center text-slate-500 font-medium"></p>
                </div>

                <button onclick="generatePlan()" class="w-full p-6 glass-card rounded-[2rem] border-2 border-transparent hover:border-indigo-600 transition group flex items-center justify-between">
                    <div class="text-left">
                        <p class="font-bold text-slate-900">Weekly Roadmap</p>
                        <p class="text-xs text-slate-500">Based on your goals</p>
                    </div>
                    <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition">
                        <i class="fas fa-calendar-check"></i>
                    </div>
                </button>
            </div>

            <!-- Chat Area -->
            <div class="lg:col-span-8 flex flex-col glass-card rounded-[2.5rem] overflow-hidden" style="height: 700px;">
                <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-6 chat-scroll">
                    <!-- Default Greeting -->
                    <div class="flex gap-4">
                        <div class="w-10 h-10 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600 flex-shrink-0">
                            <i class="fas fa-robot text-sm"></i>
                        </div>
                        <div class="bg-white p-5 rounded-3xl rounded-tl-none max-w-[85%] text-slate-700 text-sm leading-relaxed shadow-sm border border-slate-50">
                            Hello! I am your Virtual Mentor. I've analyzed your profile. How can I assist with your studies or career path today?
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-white/80 border-t border-slate-50">
                    <form onsubmit="sendMessage(event)" class="relative">
                        <input type="text" id="user-input" autocomplete="off" placeholder="Ask anything..." class="w-full py-5 px-7 bg-white rounded-3xl border-none shadow-sm outline-none focus:ring-2 focus:ring-indigo-500/20 transition pr-16">
                        <button type="submit" class="absolute right-2 top-2 bottom-2 w-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 bg-slate-900 text-white text-sm font-semibold rounded-2xl shadow-2xl transition-all duration-300 opacity-0 translate-y-20 pointer-events-none z-[100]"></div>

    <script>
        // use relative paths so the frontend and backend can be served from the
        // same origin.  When running the FastAPI app, visiting `/` will deliver
        // this file so AJAX requests go to the same host/port.
        const API_BASE = "";
        let authToken = localStorage.getItem('token');

        window.onload = () => {
            if (authToken) loadDashboard();
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0', 'translate-y-20');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-20'), 3000);
        }

        function toggleAuth(mode) {
            const isLogin = mode === 'login';
            document.getElementById('login-form').classList.toggle('hidden', !isLogin);
            document.getElementById('reg-form').classList.toggle('hidden', isLogin);
            
            document.getElementById('btn-login').className = isLogin 
                ? "flex-1 py-2.5 rounded-xl text-sm font-bold transition bg-white shadow-sm text-indigo-600"
                : "flex-1 py-2.5 rounded-xl text-sm font-bold transition text-slate-400";
            document.getElementById('btn-reg').className = !isLogin 
                ? "flex-1 py-2.5 rounded-xl text-sm font-bold transition bg-white shadow-sm text-indigo-600"
                : "flex-1 py-2.5 rounded-xl text-sm font-bold transition text-slate-400";
        }

        async function authAction(e, mode) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                if (mode === 'reg') {
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            username: data.username,
                            password: data.password,
                            major: data.major,
                            goals: data.goals.split(',').map(g => g.trim()).filter(g => g !== "")
                        })
                    });
                    if (!res.ok) throw new Error("Could not create account");
                }

                const lRes = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: data.username, password: data.password})
                });

                if (!lRes.ok) throw new Error("Invalid credentials");
                const auth = await lRes.json();
                localStorage.setItem('token', auth.access_token);
                authToken = auth.access_token;
                loadDashboard();
            } catch (err) {
                showToast(err.message);
            }
        }

        async function loadDashboard() {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dash-view').classList.remove('hidden');

            try {
                const res = await fetch(`${API_BASE}/user/profile`, {
                    headers: {'Authorization': `Bearer ${authToken}`}
                });
                if (res.status === 401) return logout();
                
                const profile = await res.json();
                document.getElementById('welcome-user').textContent = `Hi, ${profile.username}`;
                document.getElementById('profile-major').textContent = profile.major || "Not set";
                
                const goalCont = document.getElementById('goal-container');
                goalCont.innerHTML = '';
                
                // Ensure profile.goals exists and handle both array and single string
                const goalsArray = Array.isArray(profile.goals) ? profile.goals : 
                                  (profile.goals ? [profile.goals] : []);

                if (goalsArray.length === 0) {
                    goalCont.innerHTML = '<span class="text-[10px] text-slate-400 italic">No goals set yet</span>';
                } else {
                    goalsArray.forEach(goal => {
                        const span = document.createElement('span');
                        span.className = "px-4 py-1.5 bg-white rounded-xl text-[10px] font-bold text-slate-600 border border-slate-100 shadow-sm transition hover:scale-105";
                        span.textContent = goal;
                        goalCont.appendChild(span);
                    });
                }
            } catch (err) {
                showToast("Error loading profile");
                console.error(err);
            }
        }

        async function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const status = document.getElementById('file-status');
            status.innerHTML = `<i class="fas fa-spinner fa-spin mr-1"></i> Processing...`;
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/mentor/upload-context`, {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${authToken}`},
                    body: formData
                });
                const data = await res.json();
                if (data.message) {
                    showToast("Document synced successfully");
                    status.innerHTML = `<span class="text-green-600"><i class="fas fa-check-circle mr-1"></i> ${file.name}</span>`;
                } else {
                    throw new Error();
                }
            } catch (err) {
                showToast("File upload failed");
                status.textContent = "Error uploading file";
            }
        }

        function appendMessage(role, text) {
            const box = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex gap-4 fade-in ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            const contentClass = role === 'user' 
                ? "bg-indigo-600 text-white rounded-3xl rounded-tr-none" 
                : "bg-white text-slate-700 rounded-3xl rounded-tl-none shadow-sm border border-slate-50";

            div.innerHTML = `
                <div class="w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0 ${role === 'user' ? 'bg-slate-800 text-white' : 'bg-indigo-100 text-indigo-600'}">
                    <i class="fas ${role === 'user' ? 'fa-user' : 'fa-robot'} text-sm"></i>
                </div>
                <div class="${contentClass} p-5 max-w-[85%] text-sm leading-relaxed whitespace-pre-wrap">${text}</div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            appendMessage('user', msg);
            input.value = '';

            try {
                const res = await fetch(`${API_BASE}/mentor/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                appendMessage('mentor', data.mentor_response);
            } catch (err) {
                appendMessage('mentor', "⚠️ Connection error. Check your server.");
            }
        }

        async function generatePlan() {
            appendMessage('mentor', "Generating your personalized roadmap... <span class='loading-dots'></span>");
            try {
                const res = await fetch(`${API_BASE}/mentor/plan`, {
                    headers: {'Authorization': `Bearer ${authToken}`}
                });
                const data = await res.json();
                appendMessage('mentor', "📅 WEEKLY ROADMAP:\n\n" + data.weekly_plan);
            } catch (err) {
                showToast("AI limit reached. Try in 60s.");
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
